<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LandSoil AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #059669;
            --secondary: #10b981;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        h2 { margin-bottom: 1.5rem; text-align: center; font-family: 'Outfit', sans-serif; letter-spacing: -0.02em; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; color: #94a3b8; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 0.85rem;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: white;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus, select:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1.5rem;
            font-size: 1rem;
        }

        button:hover { background: #065f46; transform: translateY(-2px); }

        .msg { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; border-radius: 0.5rem; }
        
        .footer-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .footer-link a { color: var(--secondary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🌱 LandSoil AI</div>
        <h2>Create Account</h2>
        <form id="regForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div>
                    <label>Account Role</label>
                    <select id="role">
                        <option value="ROLE_ADMIN">Administrator</option>
                        <option value="ROLE_OFFICER">Agriculture Officer</option>
                        <option value="ROLE_USER">Data Entry</option>
                    </select>
                </div>
            </div>
            <button type="submit">Join the Platform</button>
        </form>
        <p class="msg" id="response"></p>
        <div class="footer-link">
            Already have an account? <a href="/login.html">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Creating Account...';
            btn.disabled = true;

            const data = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.text();
                const msgEl = document.getElementById('response');
                msgEl.innerText = result;
                msgEl.style.color = response.ok ? '#acffb8' : '#ffacac';

                if (response.ok) {
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    btn.innerText = 'Join the Platform';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('response').innerText = 'Connection error';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
