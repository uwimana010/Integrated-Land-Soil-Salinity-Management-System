<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Soil Management System</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg: #fdfdfd;
            --sidebar-bg: #ecfdf5;
            --text-main: #111827;
            --text-muted: #6b7280;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --ease: cubic-bezier(.4, 0, .2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .page-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .hero-section {
            flex: 1.1;
            position: relative;
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-image-container {
            position: relative;
            z-index: 2;
            width: 80%;
            height: 80%;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 8px solid white;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-section {
            flex: 0.9;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            z-index: 5;
            overflow-y: auto;
        }

        .form-card {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }

        .form-header { margin-bottom: 2rem; }
        .form-header h2 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; color: #1f2937; margin-bottom: 0.5rem; }
        .form-header p { color: var(--text-muted); }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600; color: #374151; }
        
        .input-wrap { position: relative; }
        .input-wrap ion-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        
        input, select {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-primary {
            width: 100%; padding: 1rem;
            background: var(--primary); color: white;
            border: none; border-radius: 0.75rem;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            margin-top: 1.5rem;
        }

        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 10px 15px rgba(16, 185, 129, 0.3); }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .alert {
            padding: 0.875rem; border-radius: 0.75rem;
            font-size: 0.875rem; margin-bottom: 1.5rem;
            display: none; align-items: center; gap: 0.6rem;
        }
        .alert.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert.show { display: flex; }

        .loader {
            width: 18px; height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-primary:disabled .loader { display: inline-block; }
        .btn-primary:disabled .btn-text { display: none; }
        .btn-primary:disabled ion-icon { display: none; }

        .footer-text { margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.875rem; }
        .footer-text a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }

        @media (max-width: 1024px) {
            .hero-section { display: none; }
            .form-section { flex: 1; padding: 2.5rem 1.5rem; }
        }
    </style>
</head>

<body>
    <div class="page-container">
        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-image-container">
                <img src="/assets/plant.png" alt="Growing Potential" class="hero-image">
            </div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-card">
                <div class="brand-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                    Integrated Land, Soil & Salinity Management System
                </div>

                <div id="registrationPanel">
                    <div class="form-header">
                        <h2>Join Our Network</h2>
                        <p>Register your account to start managing your agricultural data.</p>
                    </div>
                    
                    <div class="alert error" id="alertError">
                        <ion-icon name="alert-circle-outline"></ion-icon>
                        <span id="errorMsg"></span>
                    </div>

                    <div class="alert success" id="alertSuccess">
                        <ion-icon name="checkmark-circle-outline"></ion-icon>
                        <span>Account created! Please wait for admin approval. Redirecting to login...</span>
                    </div>

                    <form id="regForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <div class="input-wrap">
                                <ion-icon name="person-outline"></ion-icon>
                                <input type="text" id="fullName" placeholder="Alice Uwimana" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-wrap">
                                <ion-icon name="mail-outline"></ion-icon>
                                <input type="email" id="email" placeholder="alice@example.com" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Create Password</label>
                            <div class="input-wrap">
                                <ion-icon name="lock-closed-outline"></ion-icon>
                                <input type="password" id="password" placeholder="At least 6 characters" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-wrap">
                                <ion-icon name="shield-checkmark-outline"></ion-icon>
                                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>User Role</label>
                            <div class="input-wrap">
                                <ion-icon name="briefcase-outline"></ion-icon>
                                <select id="role">
                                    <option value="ROLE_USER" selected>Data Entry User</option>
                                    <option value="ROLE_OFFICER">Agricultural Officer</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary" id="regBtn">
                            <span class="btn-text">Create Account</span>
                            <div class="loader"></div>
                            <ion-icon name="arrow-forward-outline"></ion-icon>
                        </button>
                    </form>
                </div>

                <div class="footer-text">
                    Already have an account? <a href="/login.html">Sign in here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertError = document.getElementById('alertError');
            const alertSuccess = document.getElementById('alertSuccess');
            const errorMsg = document.getElementById('errorMsg');
            const regBtn = document.getElementById('regBtn');

            alertError.classList.remove('show');
            alertSuccess.classList.remove('show');

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;

            if (password !== confirmPassword) {
                alertError.classList.add('show');
                errorMsg.textContent = "Passwords do not match.";
                return;
            }

            regBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, confirmPassword, role })
                });

                if (response.ok) {
                    alertSuccess.classList.add('show');
                    document.getElementById('regForm').reset();
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    const data = await response.text();
                    alertError.classList.add('show');
                    errorMsg.textContent = data || "Registration failed. Please try again.";
                    regBtn.disabled = false;
                }
            } catch (error) {
                alertError.classList.add('show');
                errorMsg.textContent = "Connection error. Please try again later.";
                regBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
