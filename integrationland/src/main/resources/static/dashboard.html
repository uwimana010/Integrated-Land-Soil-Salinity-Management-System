<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Land & Soil Management Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --bg-body: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, hsla(152,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(217,100%,74%,0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 3rem;
        }
        .brand ion-icon { font-size: 2rem; color: var(--primary); }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.25rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .nav-link ion-icon { font-size: 1.25rem; }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 2.5rem 3rem;
            max-width: 1400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .btn-secondary:hover { background: #f8fafc; }

        /* Forms */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            background: rgba(255,255,255,0.8);
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }

        /* Land Cards */
        .lands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .land-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.75rem;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .land-card:hover {
            transform: translateY(-5px);
            border-color: rgba(16,185,129,0.2);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
        }

        .land-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #e2e8f0;
        }
        
        .land-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .land-title ion-icon { color: var(--primary); }

        .land-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Soil Records */
        .soil-record {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        .soil-record::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--secondary);
        }

        .soil-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
            font-size: 0.85rem;
        }
        .stat-badge {
            background: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            text-align: center;
            border: 1px solid #f1f5f9;
        }
        .stat-badge span { display: block; font-weight: 700; color: var(--text-main); font-size: 1rem;}

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state ion-icon { font-size: 4rem; color: #cbd5e1; margin-bottom: 1rem; }
        
        /* Advice Bubble */
        .advice-bubble {
            background: #e0e7ff;
            color: #1e3a8a;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            border-left: 4px solid #3b82f6;
        }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <ion-icon name="leaf"></ion-icon>
            LandSoil
        </div>
        <div class="nav-links">
            <a href="/dashboard.html" class="nav-link active">
                <ion-icon name="grid-outline"></ion-icon> Dashboard
            </a>
            <a href="/data-entry.html" class="nav-link" id="navDataEntry" style="display:none;">
                <ion-icon name="create-outline"></ion-icon> Data Entry
            </a>
            <a href="/crops.html" class="nav-link" id="navCrops" style="display:none;">
                <ion-icon name="leaf-outline"></ion-icon> Crop Database
            </a>
            <a href="/report.html" class="nav-link" id="navReport" style="display:none;">
                <ion-icon name="pie-chart-outline"></ion-icon> Reports
            </a>
            <a href="/admin.html" class="nav-link" id="navAdmin" style="display:none;">
                <ion-icon name="people-outline"></ion-icon> Admin Panel
            </a>
        </div>
        <div class="user-profile">
            <div class="avatar" id="userAvatar">U</div>
            <div>
                <div style="font-weight: 600; font-size: 0.95rem; line-height: 1.2;" id="userEmailDisplay">Loading...</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);" id="userRoleDisplay">Role</div>
            </div>
            <a href="#" id="logoutBtn" style="margin-left:auto; color: #ef4444; font-size: 1.25rem;"><ion-icon name="log-out-outline"></ion-icon></a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div>
                <h1>Overview</h1>
                <p style="color: var(--text-muted);">Manage your lands and analyze soil health.</p>
            </div>
            <div id="actionButtons" style="display:none;">
                <button id="addLandBtn" class="btn btn-primary">
                    <ion-icon name="add-outline"></ion-icon> Register Land
                </button>
            </div>
        </div>

        <!-- Add / Edit Land Form -->
        <div class="glass-card" id="addLandForm">
            <h3 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;" id="landFormTitle">
                <ion-icon name="map"></ion-icon> Register New Land Plot
            </h3>
            <form id="landForm">
                <input type="hidden" id="landId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Location / Name</label>
                        <input type="text" id="landLocation" required>
                    </div>
                    <div class="form-group">
                        <label>Size (Acres)</label>
                        <input type="number" step="0.1" id="landSize" required>
                    </div>
                    <div class="form-group">
                        <label>Land Type</label>
                        <input type="text" id="landType" placeholder="e.g. Agricultural, Clay" required>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="cancelLandBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="landSubmitBtn">Save Land</button>
                </div>
            </form>
        </div>

        <!-- Add Soil Form -->
        <div class="glass-card" id="addSoilForm" style="border-top: 4px solid var(--secondary);">
            <h3 style="margin-bottom: 1rem;">Add Soil Record</h3>
            <form id="soilForm">
                <input type="hidden" id="soilLandId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Soil Type</label>
                        <input type="text" id="soilType" required>
                    </div>
                    <div class="form-group">
                        <label>Moisture Level (%)</label>
                        <input type="number" step="0.1" id="moisture" required>
                    </div>
                    <div class="form-group">
                        <label>Nutrient Level (N-P-K idx)</label>
                        <input type="number" step="0.1" id="nutrient" required>
                    </div>
                    <div class="form-group">
                        <label>Salinity (dS/m)</label>
                        <input type="number" step="0.1" id="salinity" required>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="cancelSoilBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="background: var(--secondary);">Save Soil Data</button>
                </div>
            </form>
        </div>

        <!-- Add Advice Form -->
        <div class="glass-card" id="addAdviceForm" style="border-top: 4px solid #3b82f6;">
            <h3 style="margin-bottom: 1rem; display:flex; align-items:center; gap:0.5rem;"><ion-icon name="chatbubbles-outline"></ion-icon> Provide Officer Advice</h3>
            <form id="adviceForm">
                <input type="hidden" id="adviceSoilId">
                <div class="form-group">
                    <label>Soil Treatment & Land Improvement Recommendations</label>
                    <textarea id="adviceText" rows="4" style="width:100%; padding:0.85rem; border-radius:0.75rem; border:1px solid #cbd5e1; resize:vertical; font-family:'Outfit';" required placeholder="Enter expert agronomy advice here..."></textarea>
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="cancelAdviceBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="background: #3b82f6;">Post Advice</button>
                </div>
            </form>
        </div>

        <!-- Lands Grid -->
        <div class="lands-grid" id="landsList">
            <!-- Populated via JS -->
            <div class="empty-state">
                <ion-icon name="sync-outline" class="spin"></ion-icon>
                <h2>Loading Data...</h2>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api';
        
        // Auth check & Role retrieval
        const token = localStorage.getItem('jwtToken');
        const userRole = localStorage.getItem('userRole');
        const userEmail = localStorage.getItem('userEmail');
        
        if (!token) {
            window.location.href = '/login.html';
        }

        // Set UI Profile
        document.getElementById('userEmailDisplay').innerText = userEmail || 'Unknown User';
        document.getElementById('userRoleDisplay').innerText = userRole ? userRole.replace('ROLE_', '') : 'USER';
        document.getElementById('userAvatar').innerText = userEmail ? userEmail.charAt(0).toUpperCase() : 'U';

        // Role-based UI logic
        const canAddData = userRole === 'ROLE_ADMIN' || userRole === 'ROLE_USER';
        const canAnalyze = userRole === 'ROLE_ADMIN' || userRole === 'ROLE_OFFICER';
        
        if (canAddData) {
            document.getElementById('actionButtons').style.display = 'block';
            document.getElementById('navDataEntry').style.display = 'flex';
        }
        if (userRole === 'ROLE_ADMIN') {
            document.getElementById('navAdmin').style.display = 'flex';
        }
        if (canAnalyze) {
            document.getElementById('navReport').style.display = 'flex';
            document.getElementById('navCrops').style.display = 'flex';
        }

        const headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        // DOM elements
        const landsList = document.getElementById('landsList');
        const addLandForm = document.getElementById('addLandForm');
        const addSoilForm = document.getElementById('addSoilForm');
        const addAdviceForm = document.getElementById('addAdviceForm');

        // Form Toggles
        document.getElementById('addLandBtn')?.addEventListener('click', () => { 
            document.getElementById('landForm').reset();
            document.getElementById('landId').value = '';
            document.getElementById('landFormTitle').innerHTML = '<ion-icon name="map"></ion-icon> Register New Land Plot';
            addLandForm.style.display = 'block'; 
            addSoilForm.style.display = 'none';
            addAdviceForm.style.display = 'none';
        });
        document.getElementById('cancelLandBtn').addEventListener('click', () => { addLandForm.style.display = 'none'; });
        document.getElementById('cancelSoilBtn').addEventListener('click', () => { addSoilForm.style.display = 'none'; });
        document.getElementById('cancelAdviceBtn')?.addEventListener('click', () => { addAdviceForm.style.display = 'none'; });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '/login.html?logout=true';
        });

        // Add/Edit Land Submit
        document.getElementById('landForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('landId').value;
            const location = document.getElementById('landLocation').value;
            const size = document.getElementById('landSize').value;
            const landType = document.getElementById('landType').value;
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/lands/${id}` : `${API_URL}/lands`;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: headers,
                    body: JSON.stringify({ location, size, landType })
                });
                if (res.ok) {
                    addLandForm.style.display = 'none';
                    e.target.reset();
                    alert(id ? 'Land updated successfully!' : 'Land added successfully!');
                    fetchLands();
                } else {
                    alert('Error saving land plot.');
                }
            } catch (err) { alert('Request failed'); }
        });

        window.editLandForm = (id, loc, size, type) => {
            document.getElementById('landId').value = id;
            document.getElementById('landLocation').value = loc;
            document.getElementById('landSize').value = size;
            document.getElementById('landType').value = type;
            document.getElementById('landFormTitle').innerHTML = '<ion-icon name="create"></ion-icon> Edit Land Plot';
            addLandForm.style.display = 'block';
            addSoilForm.style.display = 'none';
            addLandForm.scrollIntoView({ behavior: 'smooth' });
        };

        // Add Soil Data Submit
        document.getElementById('soilForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const landId = document.getElementById('soilLandId').value;
            const soilData = {
                soilType: document.getElementById('soilType').value,
                moistureLevel: document.getElementById('moisture').value,
                nutrientLevel: document.getElementById('nutrient').value,
                salinityLevel: document.getElementById('salinity').value,
                recordDate: new Date().toISOString().split('T')[0],
                land: { landId: parseInt(landId) }
            };

            try {
                const res = await fetch(`${API_URL}/soil-data`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(soilData)
                });
                if (res.ok) {
                    addSoilForm.style.display = 'none';
                    e.target.reset();
                    alert('Soil data successfully recorded!');
                    fetchLands(); 
                } else {
                    alert('Error adding soil data');
                }
            } catch (err) { alert('Request failed'); }
        });

        window.openSoilForm = (landId) => {
            document.getElementById('soilLandId').value = landId;
            addSoilForm.style.display = 'block';
            addLandForm.style.display = 'none';
            addAdviceForm.style.display = 'none';
            addSoilForm.scrollIntoView({ behavior: 'smooth' });
        };

        window.openAdviceForm = (soilId) => {
            document.getElementById('adviceSoilId').value = soilId;
            addAdviceForm.style.display = 'block';
            addLandForm.style.display = 'none';
            addSoilForm.style.display = 'none';
            addAdviceForm.scrollIntoView({ behavior: 'smooth' });
        };

        // Add Advice Submit
        document.getElementById('adviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const soilId = document.getElementById('adviceSoilId').value;
            const data = {
                recommendationDetails: document.getElementById('adviceText').value,
                recommendationDate: new Date().toISOString().split('T')[0],
                soilData: { soilId: parseInt(soilId) }
            };

            try {
                const res = await fetch(`${API_URL}/recommendations`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    addAdviceForm.style.display = 'none';
                    e.target.reset();
                    alert('Expert advice published successfully!');
                    fetchLands(); 
                } else {
                    alert('Error saving advice.');
                }
            } catch (err) { alert('Request failed'); }
        });

        window.generateRecommendation = async (soilId) => {
            try {
                const res = await fetch(`${API_URL}/recommendations/generate/${soilId}`, {
                    method: 'POST',
                    headers: headers
                });
                if (res.ok) {
                    const result = await res.text();
                    alert(`Analysis Result:\n\n${result}`);
                } else {
                    alert('Failed to generate recommendation. Make sure you have Officer privileges.');
                }
            } catch (err) { alert('Request failed. Server may be down.'); }
        };

        // Fetch Data
        async function fetchLands() {
            try {
                const res = await fetch(`${API_URL}/lands`, { headers });
                if (res.ok) {
                    const lands = await res.json();
                    renderLands(lands);
                } else if (res.status === 401 || res.status === 403) {
                    localStorage.clear();
                    window.location.href = '/login.html';
                }
            } catch (err) {
                landsList.innerHTML = '<div class="empty-state"><ion-icon name="alert-circle-outline"></ion-icon><h3>Failed to load connect to server</h3></div>';
            }
        }
        
        async function fetchSoilData() {
             const res = await fetch(`${API_URL}/soil-data`, { headers });
             if(res.ok) return await res.json();
             return [];
        }

        async function fetchRecommendations() {
             const res = await fetch(`${API_URL}/recommendations`, { headers });
             if(res.ok) return await res.json();
             return [];
        }

        async function renderLands(lands) {
            if (lands.length === 0) {
                landsList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <ion-icon name="leaf-outline"></ion-icon>
                        <h2>No Lands Found</h2>
                        <p>Get started by registering a new land plot.</p>
                    </div>`;
                return;
            }
            
            const allSoilData = await fetchSoilData();
            const allRecs = await fetchRecommendations();

            landsList.innerHTML = '';
            lands.forEach(land => {
                const landEl = document.createElement('div');
                landEl.className = 'land-card';
                
                const landSoilData = allSoilData.filter(sd => sd.land && sd.land.landId === land.landId);
                let soilHtml = '';
                
                if(landSoilData.length > 0) {
                    landSoilData.forEach(sd => {
                        let btnHtml = canAnalyze 
                            ? `<div style="display:flex; gap:0.5rem; margin-top:0.5rem;"><button class="btn btn-secondary" style="flex:1; justify-content:center; font-size:0.8rem;" onclick="generateRecommendation(${sd.soilId})"><ion-icon name="flask-outline"></ion-icon> Auto-Recs</button>
                               <button class="btn btn-primary" style="flex:1; justify-content:center; background:#3b82f6; font-size:0.8rem;" onclick="openAdviceForm(${sd.soilId})"><ion-icon name="chatbubbles-outline"></ion-icon> Custom Advice</button></div>`
                            : `<div style="font-size:0.8rem; text-align:center; color:var(--text-muted); margin-top:0.5rem;">Only Officers can analyze</div>`;
                        
                        // Look for related advice
                        const soilRecs = allRecs.filter(rec => rec.soilData && rec.soilData.soilId === sd.soilId);
                        let adviceHtml = '';
                        soilRecs.forEach(rec => {
                            adviceHtml += `<div class="advice-bubble"><strong>Expert Advice:</strong> ${rec.recommendationDetails} <div style="font-size:0.75rem; margin-top:0.25rem;">${rec.recommendationDate}</div></div>`;
                        });

                        soilHtml += `
                            <div class="soil-record">
                                <strong style="display:block; margin-bottom:0.5rem;">${sd.soilType} Soil</strong>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Recorded: ${sd.recordDate || 'N/A'}</span>
                                <div class="soil-stats">
                                    <div class="stat-badge">Moist. <span>${sd.moistureLevel}%</span></div>
                                    <div class="stat-badge">Nutri. <span>${sd.nutrientLevel}</span></div>
                                    <div class="stat-badge">Salin. <span>${sd.salinityLevel}</span></div>
                                </div>
                                ${btnHtml}
                                ${adviceHtml}
                            </div>
                        `;
                    });
                } else {
                    soilHtml = '<div style="padding: 1rem; text-align: center; background: #f8fafc; border-radius: 1rem; color: var(--text-muted); font-size: 0.85rem;">No soil records.</div>';
                }

                const addSoilBtnHtml = canAddData 
                    ? `<button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" onclick="openSoilForm(${land.landId})">+ Add Soil Data</button>
                       <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; margin-left: 0.5rem;" onclick="editLandForm(${land.landId}, '${land.location.replace(/'/g, "\\'")}', '${land.size}', '${land.landType.replace(/'/g, "\\'")}')"><ion-icon name="pencil-outline"></ion-icon> Edit</button>`
                    : ``;

                landEl.innerHTML = `
                    <div class="land-header">
                        <div>
                            <div class="land-title"><ion-icon name="location-outline"></ion-icon> ${land.location}</div>
                            <div class="land-meta">${land.size} Acres • ${land.landType}</div>
                        </div>
                        ${addSoilBtnHtml}
                    </div>
                    <div class="soil-history">
                        <h4 style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted);">Recent Soil Data</h4>
                        ${soilHtml}
                    </div>
                `;
                landsList.appendChild(landEl);
            });
        }

        fetchLands();
    </script>
</body>
</html>
