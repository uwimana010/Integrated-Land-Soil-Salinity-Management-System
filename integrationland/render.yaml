services:
  - type: web
    name: integrationland
    runtime: docker
    plan: free # Change to starter if you need more memory
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: "-Xmx384m -Xms384m" # Recommended for Free tier (512MB RAM)
